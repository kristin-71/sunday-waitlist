<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunday — Coming Soon</title>
<meta name="description" content="A dog lifestyle app for Singapore dog owners. Coming soon.">
<meta property="og:title" content="Sunday — Coming Soon">
<meta property="og:description" content="An app for Singapore dog owners. Be first to get in.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F5F0E8;
    font-family: 'Georgia', serif;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .container {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }

  .logo {
    height: 48px;
    margin-bottom: 48px;
  }

  .mascot {
    width: 180px;
    margin: 0 auto 32px;
    display: block;
    animation: shimmy 2.2s ease-in-out infinite;
    transform-origin: bottom center;
    filter: drop-shadow(0 12px 32px rgba(0,0,0,0.12));
  }

  @keyframes shimmy {
    0%,100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  .eyebrow {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #3D5A3E;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 38px;
    line-height: 1.2;
    font-style: italic;
    margin-bottom: 16px;
    color: #1a1a1a;
  }

  .sub {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 15px;
    color: #666;
    line-height: 1.7;
    margin-bottom: 40px;
  }

  .form {
    display: flex;
    gap: 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    margin-bottom: 14px;
  }

  .form input {
    flex: 1;
    padding: 16px 20px;
    font-size: 15px;
    border: none;
    background: white;
    font-family: 'Helvetica Neue', sans-serif;
    color: #1a1a1a;
    outline: none;
  }

  .form input::placeholder {
    color: #aaa;
  }

  .form button {
    padding: 16px 24px;
    background: #3D5A3E;
    color: #F5F0E8;
    border: none;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .form button:hover {
    background: #2d4330;
  }

  .disclaimer {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: #aaa;
    margin-bottom: 56px;
  }

  .footer {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: #bbb;
  }

  .footer a {
    color: #3D5A3E;
    text-decoration: none;
  }

  /* Success state */
  .success {
    display: none;
    background: #3D5A3E;
    color: #F5F0E8;
    border-radius: 12px;
    padding: 20px 24px;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 14px;
    text-align: left;
  }

  .success strong {
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
  }
</style>
</head>

<script>
  document.getElementById('waitlist-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email-input').value;
    const btn = this.querySelector('button');
    
    btn.textContent = 'Joining...';
    btn.disabled = true;

    try {
      const res = await fetch('https://formspree.io/f/mlgplqkv', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ email })
      });

      if (res.ok) {
        document.getElementById('waitlist-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } else {
        btn.textContent = 'Try again';
        btn.disabled = false;
      }
    } catch(err) {
      btn.textContent = 'Try again';
      btn.disabled = false;
    }
  });
